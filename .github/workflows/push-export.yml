name: "Push Export"

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: "4.5.1"
  EXPORT_NAME: "godot-game-template"
  ITCH_IO: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
#  WINDOWS
# ─────────────────────────────────────────────
jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
             "/home/runner/.local/share/godot/export_templates/${GODOT_VERSION}.stable" 2>/dev/null || \
          mv "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
             "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Warm import cache
        run: godot --headless --editor --quit || true

      - name: Windows Build
        run: |
          mkdir -p builds/windows
          godot --headless --verbose --export-release "Windows Desktop" \
            "./builds/windows/${EXPORT_NAME}.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: builds/windows
          retention-days: 7

      - name: Zip for itch.io
        run: zip -r itch.zip builds/windows

      - name: Deploy to itch.io
        if: ${{ env.ITCH_IO == 'true' }}
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          PACKAGE: itch.zip

# ─────────────────────────────────────────────
#  LINUX
# ─────────────────────────────────────────────
  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
             "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Warm import cache
        run: godot --headless --editor --quit || true

      - name: Linux Build
        run: |
          mkdir -p builds/linux
          godot --headless --verbose --export-release "Linux/X11" \
            "./builds/linux/${EXPORT_NAME}.x86_64"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: builds/linux
          retention-days: 7

      - name: Zip for itch.io
        run: zip -r itch.zip builds/linux

      - name: Deploy to itch.io
        if: ${{ env.ITCH_IO == 'true' }}
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          PACKAGE: itch.zip

# ─────────────────────────────────────────────
#  WEB  (upload-pages-artifact → deploy-pages)
# ─────────────────────────────────────────────
  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" \
             "${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Warm import cache
        run: godot --headless --editor --quit || true

      - name: Web Build
        run: |
          mkdir -p builds/web
          godot --headless --verbose --export-release "Web" \
            "./builds/web/index.html"

      - name: Add .nojekyll (required for GitHub Pages)
        run: touch builds/web/.nojekyll

      - name: Upload artifact (raw)
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: builds/web
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

      - name: Zip for itch.io
        run: zip -r itch.zip builds/web

      - name: Deploy to itch.io
        if: ${{ env.ITCH_IO == 'true' }}
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: HTML
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          PACKAGE: itch.zip

# ─────────────────────────────────────────────
#  DEPLOY PAGES  (отдельный job — требует environment: github-pages)
# ─────────────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: export-web
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

