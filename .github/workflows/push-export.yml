name: Push Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5.1
  EXPORT_NAME: godot-game-template
  ITCH_IO: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.5.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            preset: "Windows Desktop"
            output: "builds/windows/${{ env.EXPORT_NAME }}.exe"
            artifact: windows
            zip_path: "builds/windows"
            itch_channel: windows

          - platform: linux
            preset: "Linux/X11"
            output: "builds/linux/${{ env.EXPORT_NAME }}.x86_64"
            artifact: linux
            zip_path: "builds/linux"
            itch_channel: linux

          - platform: web
            preset: "Web"
            output: "builds/web/index.html"
            artifact: web
            zip_path: "builds/web"
            itch_channel: HTML

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mkdir -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Warm import cache
        run: |
          godot --headless --editor --quit || true

      - name: Export ${{ matrix.platform }}
        run: |
          mkdir -p "$(dirname '${{ matrix.output }}')"
          godot --headless --verbose --export-release "${{ matrix.preset }}" "${{ matrix.output }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_path }}
          retention-days: 7

      - name: Pack itch bundle
        run: |
          cd "${{ matrix.zip_path }}"
          zip -r "${GITHUB_WORKSPACE}/itch-${{ matrix.platform }}.zip" .

      - name: Deploy to itch.io
        if: ${{ env.ITCH_IO == 'true' }}
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: ${{ matrix.itch_channel }}
          ITCH_GAME: ${{ secrets.ITCH_GAME }}
          ITCH_USER: ${{ secrets.ITCH_USER }}
          PACKAGE: "itch-${{ matrix.platform }}.zip"

      - name: Upload Pages artifact
        if: ${{ matrix.platform == 'web' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy-pages:
    name: Deploy GitHub Pages
    needs: export
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4